name: Auto Update Worker

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 1 * * *" # 每天凌晨 1 点运行
  workflow_dispatch:
    inputs:
      force_update:
        description: '是否强制更新（忽略版本检查）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置环境
        run: |
          echo "REPO_URL=https://api.github.com/repos/bia-pain-bache/BPB-Worker-Panel/releases" >> $GITHUB_ENV
          echo "TARGET_FILE=worker.zip" >> $GITHUB_ENV

      - name: 检查并更新 Worker
        id: check_step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          log() { echo "[$(date +'%Y-%m-%d %H:%M:%S')] $1"; }
          
          log "开始检查更新..."
          LOCAL_VERSION=$(cat version.txt 2>/dev/null || echo "none")
          
          # 获取 API 数据
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "$REPO_URL")
          
          # 解析最新版本号和下载地址
          TAG_NAME=$(echo "$RESPONSE" | jq -r '.[0].tag_name // empty')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.[0].assets[] | select(.name == "'"$TARGET_FILE"'") | .browser_download_url // empty')

          if [ -z "$TAG_NAME" ] || [ -z "$DOWNLOAD_URL" ]; then
            log "ERROR: 无法获取 Release 信息或下载地址，请检查上游仓库。"
            exit 1
          fi

          log "本地版本: $LOCAL_VERSION"
          log "最新版本: $TAG_NAME"

          # 判断是否需要更新
          FORCE="${{ github.event.inputs.force_update }}"
          if [ "$LOCAL_VERSION" == "$TAG_NAME" ] && [ "$FORCE" != "true" ]; then
            log "✅ 已是最新版本，跳过更新。"
            echo "updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 执行下载与解压
          log "🚀 正在下载 $TARGET_FILE..."
          wget -q -O "$TARGET_FILE" "$DOWNLOAD_URL"
          unzip -o "$TARGET_FILE"
          rm "$TARGET_FILE"
          
          echo "$TAG_NAME" > version.txt
          log "✅ 更新完成！"
          
          # 传递版本号给后续步骤
          echo "updated=true" >> $GITHUB_OUTPUT
          echo "new_tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: 提交更改
        if: steps.check_step.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 自动同步 Worker 版本至 ${{ steps.check_step.outputs.new_tag }}"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: 'version.txt *' # 确保提交 version.txt 和解压出来的所有文件
